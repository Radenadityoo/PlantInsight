services:
  - type: web
    name: plantinsight
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: plantinsight-db
          property: connectionString

databases:
  - name: plantinsight-db
    databaseName: plantinsight
    user: plantinsight
